<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GoidaX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #fff;
            width: 350px;
            height: 500px;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff9d, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #00ff9d, #00cc7a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0, 255, 157, 0.4);
            transition: all 0.3s ease;
            margin: 30px 0;
            border: none;
            color: #0f0f23;
        }
        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 60px rgba(0, 255, 157, 0.6);
        }
        .button:active {
            transform: scale(0.95);
        }
        .status {
            font-size: 18px;
            margin: 10px 0;
            text-align: center;
        }
        .timer {
            font-size: 32px;
            font-weight: 700;
            color: #00ff9d;
        }
        .custom-dns {
            margin-top: 20px;
            width: 100%;
        }
        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="logo">GOIDAX</div>
    <div id="main">
        <button id="activateBtn" class="button">АКТИВИРОВАТЬ<br>ОБХОД</button>
        <div id="status" class="status">Нажмите для активации DNS</div>
        <div id="timer" class="timer">60:00</div>
    </div>
    <div class="custom-dns">
        <button id="customBtn">Собрать свой DNS</button>
        <button id="sitesBtn">Открыть заблокированные сайты</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
