<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Games</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 Flex Games</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск игр..." />
                <select id="categoryFilter">
                    <option value="all">Все категории</option>
                    <option value="unity">Unity</option>
                    <option value="html5">HTML5</option>
                    <option value="other">Другие</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="gameGrid" class="game-grid"></div>
        <div id="noResults" style="display:none;">Игр не найдено</div>
    </main>

    <footer>
        <div class="container">
            <p>Автоматическое обновление каждые 6 часов через GitHub Actions</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

body {
    background: #0b0e14;
    color: #e4e6eb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

header {
    background: #1a1f2b;
    padding: 20px 0;
    border-bottom: 2px solid #2a3242;
}

header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #f7c948, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
}

.search-box {
    display: flex;
    gap: 12px;
    margin-top: 15px;
    flex-wrap: wrap;
}

#searchInput {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border-radius: 30px;
    border: 1px solid #2a3242;
    background: #141a24;
    color: #e4e6eb;
    font-size: 1rem;
    outline: none;
    transition: 0.3s;
}
#searchInput:focus {
    border-color: #f7c948;
}

#categoryFilter {
    padding: 10px 16px;
    border-radius: 30px;
    border: 1px solid #2a3242;
    background: #141a24;
    color: #e4e6eb;
    font-size: 1rem;
    outline: none;
    cursor: pointer;
}

.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
    padding: 30px 0;
}

.game-card {
    background: #1a1f2b;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 1px solid #2a3242;
}
.game-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.6);
}

.game-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    background: #0b0e14;
}

.game-card .info {
    padding: 14px;
}

.game-card .info h3 {
    font-size: 1.1rem;
    margin-bottom: 4px;
    color: #f0f2f5;
}

.game-card .info .category {
    font-size: 0.8rem;
    color: #a0aec0;
    background: #2a3242;
    padding: 2px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 6px;
}

#noResults {
    text-align: center;
    font-size: 1.2rem;
    color: #a0aec0;
    padding: 40px 0;
}

footer {
    margin-top: auto;
    background: #1a1f2b;
    padding: 16px 0;
    text-align: center;
    border-top: 1px solid #2a3242;
    color: #7a849c;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    .game-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 16px;
    }
    .search-box {
        flex-direction: column;
    }
}</style> <script>(async function() {
    const grid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const noResults = document.getElementById('noResults');

    let allGames = [];

    // Загружаем игры из games.json
    try {
        const res = await fetch('games.json');
        if (!res.ok) throw new Error('Не удалось загрузить игры');
        allGames = await res.json();
    } catch (e) {
        console.error(e);
        allGames = [];
    }

    function renderGames(games) {
        grid.innerHTML = '';
        if (games.length === 0) {
            noResults.style.display = 'block';
            return;
        }
        noResults.style.display = 'none';
        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <img src="${game.image || 'https://via.placeholder.com/200x140/2a3242/ffffff?text=No+Image'}" alt="${game.title}" loading="lazy" />
                <div class="info">
                    <h3>${game.title}</h3>
                    <span class="category">${game.category || 'Другое'}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                if (game.url) window.open(game.url, '_blank');
            });
            grid.appendChild(card);
        });
    }

    function filterGames() {
        const query = searchInput.value.toLowerCase().trim();
        const category = categoryFilter.value;
        const filtered = allGames.filter(game => {
            const matchTitle = game.title.toLowerCase().includes(query);
            const matchCategory = category === 'all' || game.category === category;
            return matchTitle && matchCategory;
        });
        renderGames(filtered);
    }

    searchInput.addEventListener('input', filterGames);
    categoryFilter.addEventListener('change', filterGames);

    // Первоначальный рендеринг
    renderGames(allGames);
})();</script>
